# Set the root logger level to INFO and output to console
rootLogger.level = info
rootLogger.appenderRef.stdout.ref = console

# Define the Console Appender
appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# Define the Rolling File Appender
appender.file.type = RollingFile
appender.file.name = file
appender.file.fileName = logs/application.log
appender.file.filePattern = logs/application-%d{MM-dd-yy}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 5

# Link the "loanbridge" logger to the file and console
logger.loanbridge.name = loanbridge
logger.loanbridge.level = info
logger.loanbridge.additivity = false
logger.loanbridge.appenderRef.file.ref = file
logger.loanbridge.appenderRef.stdout.ref = console